name: Content Factory Orchestrator (Duplicate-Proof)

on:
  workflow_dispatch:         # Allows manual trigger

jobs:
  process-queue:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Allows the bot to push files back to repo
      actions: write         # Required to read/write rolling artifact tracking pools

    steps:
      # 1. Checkout your repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Install lightweight dependencies
      - name: Install Dependencies
        run: |
         pip install requests openai yt-dlp requests[socks]
         python -m pip install --upgrade pip
         pip install playwright
         playwright install chromium --with-deps
         

      # 4. Process queue → generate pipeline_data.json & push updates back to repo
      - name: Process Queue, Generate Pipeline & Push Changes
        run: |
          python3 << 'EOF'
          import os, json, re
          from datetime import datetime, timezone
          
          if not os.path.exists('reel_queue.json'):
              print("❌ Critical Error: reel_queue.json does not exist in the root directory!")
              exit(1)
              
          with open('reel_queue.json', 'r') as f:
              data = json.load(f)
          
          queue = data.get('queue', [])
          processed = {p['url'].strip().lower() for p in data.get('processed', []) if 'url' in p}
          
          pick = None
          for r in queue:
              url_lower = r['url'].strip().lower()
              if any(x in url_lower for x in ['youtube.com', 'youtu.be', 'shorts']):
                  if url_lower not in processed:
                      pick = r
                      break
          
          if not pick:
              print("✅ No new YouTube videos or shorts found. Exiting.")
              exit(0)
          
          # Extract the core YouTube video/short ID string
          sc_match = re.search(r'(?:shorts/|v=|be/)([^/?&]+)', pick['url'])
          sc = sc_match.group(1) if sc_match else "unknown"
          user = pick.get('username', 'unknown')
          
          # Force create and save the pipeline_data.json payload file
          with open('pipeline_data.json', 'w') as f:
              json.dump({
                 "reel_url": pick['url'], 
                 "shortcode": sc, 
                 "username": user,
                 "script_text": " ",
                 "youtube_title": "AI Hack #shorts",
                 "youtube_description": f"Tip from @{user}. #ai",
                 "youtube_tags": ["AI","Shorts"]
              }, f, indent=2)
              f.flush()
              os.fsync(f.fileno())
          
          # Append to processed and update reel_queue.json file variables
          data.setdefault('processed', []).append({
              "url": pick['url'], "username": user,
              "status": "in_progress", "started_at": datetime.now(timezone.utc).isoformat()
          })
          with open('reel_queue.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.flush()
              os.fsync(f.fileno())
              
          print(f"✅ Data processing complete inside runner storage for: {pick['url']}")
          EOF

          # --- GIT COMMIT AND PUSH ENGINE BLOCK ---
          echo "🔄 Setting up local git environment configurations..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # Track the target payload configurations explicitly
          git add reel_queue.json pipeline_data.json
          
          # Verify modifications and push out to repository workspace root
          if ! git diff-index --quiet HEAD; then
            echo "📝 Committing file adjustments to branch history..."
            git commit -m "chore: cycle queue allocations and update processing profiles [skip ci]"
            git push origin HEAD:${{ github.ref }}
            echo "🚀 File updates successfully synchronized back into Github repository workspace root!"
          else
            echo "ℹ️ Workspace files are identical to repository tracking. Push sequence bypassed."
          fi


      # ====================================================================
      # ROBUST ROUTINE: HEADED PLAYWRIGHT VIRTUAL SCREEN BYPASS (NO COOKIES)
      # ====================================================================

      # 4a. Initialize a Virtual Screen Buffer (Xvfb) so Chromium can run with headless=false in the cloud
      - name: Initialize Virtual Display Framebuffer
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          # Start Xvfb background display port 99
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 3

              # 4b. Use genuine browser simulation to process y2mate completely safely
      - name: Cloud Download Video Asset via Playwright Simulation
        env:
          DISPLAY: :99
        run: |
          python3 << 'EOF'
          import json, os, subprocess, asyncio, shutil
          from playwright.async_api import async_playwright
          
          async def run_stealth_download():
              # 1. Extraction safety checks
              if not os.path.exists('pipeline_data.json'):
                  print("ℹ️ pipeline_data.json missing. Skipping download cycle.")
                  return
                  
              with open('pipeline_data.json', 'r') as f:
                  pipeline = json.load(f)
              
              reel_url = pipeline.get('reel_url')
              shortcode = pipeline.get('shortcode', 'downloaded_reel')
              
              if not reel_url or "unknown" in reel_url:
                  print("❌ Missing video URL target path inside JSON queue.")
                  return
              
              # CRITICAL AUTOMATED RESET: Wipes out previous video file frames completely
              if os.path.exists('downloads'):
                  shutil.rmtree('downloads')
                  print("🧹 Storage Reset: Prior video files completely purged from memory workspace.")
                  
              os.makedirs('downloads', exist_ok=True)
              output_path = f"downloads/reelforyoutube.mp4"
              
              print(f"🚀 Launching real browser instance to download from v22.www-y2mate.com: {reel_url}")
              
              video_stream_url = None
              download_success = False
              
              async with async_playwright() as p:
                  browser = await p.chromium.launch(
                      headless=False,
                      args=["--disable-blink-features=AutomationControlled", "--no-sandbox"]
                  )
                  
                  context = await browser.new_context(
                      viewport={'width': 1280, 'height': 800},
                      user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36",
                      accept_downloads=True
                  )
                  
                  # Handle array element conversion for page selection
                  pages = context.pages
                  page = pages[0] if len(pages) > 0 else await context.new_page()
                  
                  # Suppress ad network popup windows natively
                  context.on('page', lambda popup: asyncio.create_task(popup.close()) if print("🛡️ Suppressed ad network popup window.") or True else None)
                  await page.route("**/*", lambda route: route.continue_() if not any(x in route.request.url for x in ["googlesyndication", "doubleclick", "adservice", "popads"]) else route.abort())
                  
                  print("🌐 Loading downloader frontend...")
                  await page.goto('https://v22.www-y2mate.com/', wait_until='domcontentloaded', timeout=60000)
                  await page.wait_for_timeout(2000)
                  
                  # Paste link matching target layout textbox structures
                  textbox = page.get_by_role('textbox', name='Search or paste link here...')
                  await textbox.wait_for(state='visible', timeout=30000)
                  await textbox.dblclick()
                  await textbox.fill(reel_url)
                  await textbox.press('Enter')
                  print("✏️ Link entered and search submitted.")
                  
                  try:
                      # Target widget API framing window
                      widgetIframe = page.frame_locator('#widgetv2Api')
                      
                      print("🗂️ Switching to Video tab...")
                      await widgetIframe.get_by_role('link', name='Video').click()
                      await page.wait_for_timeout(1000)
                      
                      print("👆 Clicking initial conversion row button...")
                      await widgetIframe.get_by_role('row', name='1080p (.mp4) Auto  Download').get_by_role('button').click()
                      
                      print("⏳ Waiting for backend to compile stream and clicking final Download link...")
                      finalDownloadLink = widgetIframe.get_by_role('link', name='Download')
                      await finalDownloadLink.waitFor(state='visible', timeout=45000)
                      
                      print("🎯 Native Playwright event listener active. Triggering physical browser stream click...")
                      async with context.expect_download(timeout=30000) as download_info:
                          await finalDownloadLink.click()
                      
                      download = await download_info.value
                      await download.save_as(output_path)
                      download_success = True
                      print("✅ Successfully captured file directly via native browser download event.")
                      
                  except Exception as event_error:
                      print(f"⚠️ Playwright automation layout loop caught an exception: ({event_error})")
                              
                  await browser.close()
              
              if os.path.exists(output_path):
                  file_size = os.path.getsize(output_path)
                  if file_size > 50000:
                      print(f"🎉 Real video asset captured successfully! Size: {file_size / (1024*1024):.2f} MB")
                  else:
                      os.remove(output_path)
                      print("❌ Download output contains light text metrics instead of video data. Dropping placeholder.")
              else:
                  print("❌ Core system disk space rejected file creation execution.")
          
          asyncio.run(run_stealth_download())
          EOF

      

      # 10. Run FFmpeg adjustments to clear watermarks and force exact 1080x1920 layout structures
      - name: FFmpeg Layout Conforming & Logo Correction
        run: |
          # Applies an overlay delogo filter box at x=40, y=40 to mask out core watermarks
          # Then converts layout specs to H.264 video encoding at 30 fps max for Instagram Reels
          ffmpeg -y -i downloads/reelforyoutube.mp4 -vf "delogo=x=40:y=40:w=170:h=70,scale=1080:1920,fps=30" \
          -c:v libx264 -profile:v main -level 4.0 -pix_fmt yuv420p \
          -c:a aac -b:a 128k downloads/final_instagram_ready.mp4
          echo "✅ Processing engine finished layout conformation steps."

      # 11. Run local open-source AI BLIP model to inspect frame contexts for SEO captions
      - name: Local Open-Source AI SEO Caption Engine
        run: |
          python3 << 'EOF'
          import cv2, json
          from PIL import Image
          from transformers import BlipProcessor, BlipForConditionalGeneration

          # Slice a single mid-clip frame to let the AI process it
          v_path = "downloads/final_instagram_ready.mp4"
          cap = cv2.VideoCapture(v_path)
          total_f = int(cap.get(cv2.CAP_PROP_FRAME_COUNT))
          cap.set(cv2.CAP_PROP_POS_FRAMES, total_f // 2)
          ret, frame = cap.read()
          cap.release()

          if ret:
              cv2.imwrite("frame_analysis.jpg", frame)
              print("📸 Extracted mid-frame target checkpoint file.")
              
              # Pull the local BLIP vision-to-text models right onto the GitHub runner completely for free
              processor = BlipProcessor.from_pretrained("Salesforce/blip-image-captioning-large")
              model = BlipForConditionalGeneration.from_pretrained("Salesforce/blip-image-captioning-large")
              
              img = Image.open("frame_analysis.jpg").convert('RGB')
              inputs = processor(img, return_tensors="pt")
              output_tokens = model.generate(**inputs)
              ai_insight = processor.decode(output_tokens, skip_special_tokens=True)
          else:
              ai_insight = "new curated content"

          seo_caption = f"🔥 {ai_insight.capitalize()}! Check this out right now.\n\n#viral #trending #reels #fyp #shorts #ai"
          
          with open('pipeline_data.json', 'r') as f:
              p_data = json.load(f)
          p_data['instagram_caption'] = seo_caption
          with open('pipeline_data.json', 'w') as f:
              json.dump(p_data, f, indent=2)
          print("✅ Custom localized AI caption appended successfully.")
          EOF

      # 12. Connect directly to Meta Content Publishing Graph API and bind the tracking Audio ID
      - name: Meta Graph API Multi-Step Media Publishing
        env:
          IG_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FACEBOOK_USER_ACCESS_TOKEN }}
          BLASTOFF_AUDIO_ID: ${{ secrets.BLASTOFF_AUDIO_ID }}
        run: |
          python3 << 'EOF'
          import os, json, time, requests

          IG_ACCOUNT_ID = os.getenv("IG_ACCOUNT_ID")
          ACCESS_TOKEN = os.getenv("FB_ACCESS_TOKEN")
          AUDIO_ID = os.getenv("BLASTOFF_AUDIO_ID")

          with open('pipeline_data.json', 'r') as f:
              pipeline = json.load(f)

          # NOTE: Meta's media endpoint requires a public link to download the video into their network.
          # Make sure your pipeline uploads the file 'downloads/final_instagram_ready.mp4' to a public storage folder 
          # (like Cloudflare R2, Backblaze B2, an S3 bucket, or a live ngrok folder path) and insert that link here:
          PUBLIC_URL = "https://your-publicly-hosted-bucket-storage.com"

          endpoint_url = f"https://facebook.com{IG_ACCOUNT_ID}"
          payload = {
              "media_type": "REELS",
              "video_url": PUBLIC_URL,
              "caption": pipeline['instagram_caption'],
              "audio_configuration": {
                  "audio_id": AUDIO_ID,
                  "audio_volume": 100,
                  "video_volume": 20   # Automatically lowers background speech so Blastoff's audio tracks play clearly
              },
              "access_token": ACCESS_TOKEN
          }

          print("🔗 Building Meta Graph cloud container asset...")
          res = requests.post(f"{endpoint_url}/media", json=payload).json()
          if "id" not in res:
              print(f"❌ Core API Upload Blocked: {res}")
              exit(1)
              
          container_id = res["id"]
          
          # Status evaluation polling loop
          check_url = f"https://facebook.com{container_id}"
          while True:
              status_report = requests.get(check_url, params={"fields": "status_code", "access_token": ACCESS_TOKEN}).json()
              current_status = status_report.get("status_code", "IN_PROGRESS")
              print(f"⏳ Meta transcode worker profile status: {current_status}")
              if current_status == "FINISHED":
                  break
              elif current_status == "ERROR":
                  print(f"❌ Meta Engine processing failure layout: {status_report}")
                  exit(1)
              time.sleep(15)

          # Live Release Execution Hook
          print("🚀 Transcode clear. Publishing Live to Instagram...")
          final_res = requests.post(f"{endpoint_url}/media_publish", data={"creation_id": container_id, "access_token": ACCESS_TOKEN}).json()
          print(f"🎉 Fully completed automated publish process. Tracking Reference ID: {final_res}")
          EOF

      # 13. Permanently write your changes to the queue to ensure duplicate links are omitted moving forward
      - name: Save Queue Registry Progress Changes
        run: |
          git config --global user.name "Automated Curation Bot"
          git config --global user.email "bot@contentfactory.internal"
          git add reel_queue.json
          git commit -m "Cleanup: Marked processed video link off active production queue [skip ci]" || echo "No changes to commit"
          git push
